<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register - RevVault</title>
    <!-- Dependencies (Bootstrap & FontAwesome) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom Application Styles -->
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>
    <div class="auth-card auth-card-lg">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join RevVault today and secure your identity</p>
        </div>

        <!-- Error Feedback -->
        <div th:if="${error}" class="alert alert-danger py-2 small mb-4" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <!-- Row 1: Name and Username -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control"
                        th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''" required
                        placeholder="e.g. Rahul Kumar">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control"
                        th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" required
                        placeholder="e.g. rahul_k">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                    </div>
                </div>
            </div>

            <!-- Row 2: Email and Mobile -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control"
                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" required
                        placeholder="rahul@example.com">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" th:field="*{mobile}" class="form-control"
                        th:classappend="${#fields.hasErrors('mobile')} ? 'is-invalid' : ''"
                        placeholder="+91 98765 43210">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></div>
                </div>
            </div>

            <!-- Master Password -->
            <div class="mb-4">
                <label class="form-label">Master Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" th:field="*{masterPassword}" class="form-control"
                        th:classappend="${#fields.hasErrors('masterPassword')} ? 'is-invalid' : ''" required
                        placeholder="Create strong master password">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('masterPassword')}"
                        th:errors="*{masterPassword}"></div>
                </div>
                <small class="text-muted">This password encrypts your entire vault. <strong>Don't lose
                        it!</strong></small>
            </div>

            <!-- Security Questions Section (Required for Recovery) -->
            <div class="security-section">
                <h5 class="mb-3"><i class="fas fa-shield-alt me-2 text-primary"></i>Security Questions</h5>
                <p class="small text-muted mb-3">Keep these answers safe. They are required for account recovery.</p>

                <div class="mb-3">
                    <select th:field="*{securityQuestion1}" class="form-select mb-2"
                        th:classappend="${#fields.hasErrors('securityQuestion1')} ? 'is-invalid' : ''" required>
                        <option value="" selected disabled>Select Question 1</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet? (e.g.
                            Bruno)</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What was the name of your primary school?">What was the name of your primary
                            school?</option>
                        <option value="In what city were you born?">In what city were you born?</option>
                    </select>
                    <input type="text" th:field="*{securityAnswer1}" class="form-control" required
                        placeholder="Your Answer 1">
                </div>

                <div class="mb-3">
                    <select th:field="*{securityQuestion2}" class="form-select mb-2"
                        th:classappend="${#fields.hasErrors('securityQuestion2')} ? 'is-invalid' : ''" required>
                        <option value="" selected disabled>Select Question 2</option>
                        <option value="What is your favorite book?">What is your favorite book?</option>
                        <option value="What was the make of your first car?">What was the make of your first car?
                        </option>
                        <option value="What is your favorite movie?">What is your favorite movie?</option>
                        <option value="What is the name of your favorite childhood friend?">What is the name of your
                            friend?</option>
                    </select>
                    <input type="text" th:field="*{securityAnswer2}" class="form-control" required
                        placeholder="Your Answer 2">
                </div>

                <div class="mb-0">
                    <select th:field="*{securityQuestion3}" class="form-select mb-2"
                        th:classappend="${#fields.hasErrors('securityQuestion3')} ? 'is-invalid' : ''" required>
                        <option value="" selected disabled>Select Question 3</option>
                        <option value="What is your father's middle name?">What is your father's middle name?</option>
                        <option value="What was your dream job as a child?">What was your dream job as a child?</option>
                        <option value="What is the name of the hospital where you were born?">What hospital were you
                            born in?</option>
                        <option value="What is your favorite color?">What is your favorite color?</option>
                    </select>
                    <input type="text" th:field="*{securityAnswer3}" class="form-control" required
                        placeholder="Your Answer 3">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 mt-var(--s-md)">
                <i class="fas fa-user-plus me-2"></i> Create Secure Account
            </button>
        </form>

        <div class="footer-text">
            Already have an account? <a th:href="@{/login}">Sign In</a>
        </div>
    </div>

    <!-- External JavaScript Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
