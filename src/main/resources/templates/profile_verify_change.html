<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Verify Identity - RevVault</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8faff;
            font-family: 'Inter', sans-serif;
            padding-top: 50px;
        }

        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            background: white;
            padding: 40px;
            max-width: 600px;
            margin: auto;
        }

        .form-label {
            font-weight: 600;
            color: #555;
        }

        .btn-verify {
            background: #3498db;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card-custom">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Security Verification</h2>
                <p class="text-muted">A verification code has been sent to your email. Please answer your security
                    questions to confirm the master password change.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/profile/verify-change}" method="post">
                <div class="mb-4">
                    <label class="form-label">Verification Code (OTP)</label>
                    <input type="text" name="otp" class="form-control" placeholder="Enter 6-digit code" required
                        maxlength="6">
                </div>

                <hr class="my-4">
                <h5 class="fw-bold mb-3">Security Questions</h5>

                <div th:each="question, iter : ${questions}" class="mb-3">
                    <label class="form-label" th:text="${question}"></label>
                    <input type="text" name="answers" class="form-control" placeholder="Your answer" required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-verify">
                        <i class="fas fa-check-circle me-2"></i> Verify & Update Password
                    </button>
                    <a th:href="@{/profile}" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
