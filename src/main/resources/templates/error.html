<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Error - RevVault</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f7f6;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .error-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .error-icon {
            font-size: 80px;
            color: #e74c3c;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--primary-color);
            font-weight: 800;
            margin-bottom: 15px;
        }

        p {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 th:text="${status != null ? 'Error ' + status : 'Oops!'}">Error</h1>
        <p th:text="${message != null ? message : 'Something went wrong while processing your request.'}">
            Something went wrong.
        </p>
        <div th:if="${validationErrors}" class="text-start mb-4">
            <ul class="list-group list-group-flush small">
                <li th:each="err : ${validationErrors}" class="list-group-item text-danger border-0 py-1">
                    <i class="fas fa-circle-exclamation me-2"></i>
                    <strong th:text="${err.key}">Field</strong>: <span th:text="${err.value}">Error</span>
                </li>
            </ul>
        </div>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>Back to Safety
        </a>
    </div>
</body>

</html>
