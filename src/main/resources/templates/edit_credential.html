<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Credential - RevVault</title>
    <!-- Dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom Application Styles -->
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>

<body>
    <div class="main-wrapper">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h4>RevVault</h4>
            </div>
            <div class="nav-links">
                <a th:href="@{/dashboard}"><i class="fas fa-shield-alt"></i> My Vault</a>
                <a th:href="@{/vault/add}"><i class="fas fa-plus-circle"></i> Add New</a>
                <a th:href="@{/generator}"><i class="fas fa-key"></i> Pass Generator</a>
                <a th:href="@{/audit}"><i class="fas fa-chart-line"></i> Audit Report</a>
                <a th:href="@{/profile}"><i class="fas fa-user-circle"></i> Profile Setting</a>
                <a th:href="@{/two-factor}"><i class="fas fa-key"></i> Two Factor Auth</a>
            </div>
            <div class="logout-btn">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-link text-white text-decoration-none p-0">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </button>
                </form>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <div class="form-container">
                <div class="form-header">
                    <h2><i class="fas fa-edit me-2"></i> Edit Credential</h2>
                    <p>Update the details for <strong><span th:text="${credential.accountName}"></span></strong></p>
                </div>

                <form th:action="@{/vault/add}" th:object="${credential}" method="post">
                    <!-- Hidden ID field is essential for updates -->
                    <input type="hidden" th:field="*{id}" />

                    <!-- Account Name -->
                    <div class="mb-4">
                        <label class="form-label">Account Name / Service</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-tag"></i></span>
                            <input type="text" th:field="*{accountName}" class="form-control"
                                placeholder="e.g. Google, Netflix, Amazon" required>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Username -->
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" th:field="*{username}" class="form-control"
                                    placeholder="e.g. rahul@example.com" required>
                            </div>
                        </div>
                        <!-- Category -->
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Category</label>
                            <select th:field="*{category}" class="form-select">
                                <option value="Personal">Personal</option>
                                <option value="Work">Work</option>
                                <option value="Social">Social</option>
                                <option value="Finance">Finance</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Password with Generator -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label mb-0">Password</label>
                            <button type="button" class="btn-generate" onclick="generateStrongPassword()">
                                <i class="fas fa-magic me-1"></i> Generate New
                            </button>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" th:field="*{password}" id="passwordField" class="form-control"
                                required placeholder="Current or new password">
                            <button type="button" class="btn btn-outline-secondary"
                                style="border-radius: 0 10px 10px 0; border: 1px solid var(--border-color); border-left: none;"
                                onclick="toggleVisibility()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Website URL -->
                    <div class="mb-4">
                        <label class="form-label">Website URL</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-link"></i></span>
                            <input type="url" th:field="*{url}" class="form-control" placeholder="https://example.com">
                        </div>
                    </div>

                    <!-- Favorite Toggle -->
                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:field="*{isFavorite}" id="isFavorite">
                            <label class="form-check-label fw-bold" for="isFavorite" style="cursor: pointer;">Mark as
                                Favorite</label>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="mb-5">
                        <label class="form-label">Additional Notes</label>
                        <textarea th:field="*{notes}" class="form-control" rows="3"
                            placeholder="Security questions, recovery codes, or hints..."></textarea>
                    </div>

                    <!-- Actions -->
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold">
                            <i class="fas fa-save me-2"></i> Update Credential
                        </button>
                        <a th:href="@{/dashboard}" class="btn btn-light text-muted py-2">
                            <i class="fas fa-times me-1"></i> Cancel Changes
                        </a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Dependencies & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/form.js}"></script>
</body>

</html>
