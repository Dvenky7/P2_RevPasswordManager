<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Verify Registration - RevVault</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card card-custom">
            <div class="text-center mb-4">
                <div class="auth-icon-circle mb-3 mx-auto">
                    <i class="fas fa-envelope-open-text text-primary fa-2x"></i>
                </div>
                <h3 class="fw-bold">Verify Your Email</h3>
                <p class="text-muted small">We've sent a 6-digit verification code to your registered email address.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register/verify}" method="post">
                <input type="hidden" name="username" th:value="${username}">
                <div class="mb-4">
                    <label for="otp" class="form-label text-center d-block">Enter Verification Code</label>
                    <input type="text" name="otp" id="otp" class="form-control text-center py-3 fw-bold ls-lg"
                        placeholder="000000" maxlength="6" required autocomplete="off">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                    Verify & Activate Account
                </button>

                <div class="text-center">
                    <p class="text-muted small mb-0">Didn't receive the code?</p>
                    <a href="#" class="small text-decoration-none">Resend OTP</a>
                </div>
            </form>
        </div>
    </div>

    <style>
        .ls-lg {
            letter-spacing: 0.5rem;
            font-size: 1.5rem;
        }
    </style>
</body>

</html>
